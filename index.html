<!DOCTYPE html>
<html>
<head>
    <title>Mi App con Firebase</title>
    <style>
        body { 
            font-family: Arial; 
            max-width: 600px; 
            margin: 50px auto; 
            padding: 20px;
        }
        input { 
            padding: 10px; 
            width: 100%; 
            box-sizing: border-box;
            margin-bottom: 10px;
            font-size: 16px;
        }
        button { 
            padding: 10px 20px; 
            background-color: blue;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }
        .datos { 
            margin-top: 30px; 
            border: 2px solid #ccc; 
            padding: 15px;
            background-color: #f9f9f9;
        }
        .item {
            border-bottom: 1px solid #ddd;
            padding: 10px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>Guardando Datos Compartidos</h1>
    
    <label>Tu nombre:</label>
    <input type="text" id="nombre" placeholder="Escribe tu nombre aquí">
    
    <label>Tu mensaje:</label>
    <input type="text" id="mensaje" placeholder="Escribe tu mensaje aquí">
    
    <button onclick="guardarDato()">GUARDAR</button>

    <div class="datos">
        <h2>Todos los datos guardados:</h2>
        <div id="lista"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-database.js"></script>

    <script>
        // AQUI CAMBIAS TUS DATOS
        const firebaseConfig = {
            apiKey: "AIzaSyBfLKi3a6kZqkMKPQ8wRADQlUu3_NacXAA",
            databaseURL: "https://modo-prueba-bb8c2-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function guardarDato() {
            const nombre = document.getElementById('nombre').value;
            const mensaje = document.getElementById('mensaje').value;

            if (nombre.trim() === '' || mensaje.trim() === '') {
                alert('Por favor llena todos los campos');
                return;
            }

            db.ref('datos').push({
                nombre: nombre,
                mensaje: mensaje,
                fecha: new Date().toLocaleString('es-AR')
            });
            
            document.getElementById('nombre').value = '';
            document.getElementById('mensaje').value = '';
            alert('¡Guardado correctamente!');
        }

        // Cargar datos
        db.ref('datos').on('value', (snapshot) => {
            const lista = document.getElementById('lista');
            lista.innerHTML = '';
            
            if (!snapshot.exists()) {
                lista.innerHTML = '<p>Sin datos aún...</p>';
                return;
            }
            
            snapshot.forEach((child) => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <strong>${child.val().nombre}</strong><br>
                    ${child.val().mensaje}<br>
                    <small>${child.val().fecha}</small>
                `;
                lista.appendChild(div);
            });
        });
    </script>
</body>
</html>
