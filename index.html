html<!DOCTYPE html>
<html>
<head>
    <title>Mi App con Firebase</title>
    <style>
        body { 
            font-family: Arial; 
            max-width: 600px; 
            margin: 50px auto; 
            padding: 20px;
            background-color: #f5f5f5;
        }
        input { 
            padding: 10px; 
            width: 100%; 
            box-sizing: border-box;
            margin-bottom: 10px;
            font-size: 16px;
            border: 1px solid #ddd;
        }
        button { 
            padding: 10px 20px; 
            background-color: #007bff;
            color: white;
            cursor: pointer;
            font-size: 16px;
            border: none;
            width: 100%;
        }
        button:hover {
            background-color: #0056b3;
        }
        .datos { 
            margin-top: 30px; 
            border: 2px solid #ccc; 
            padding: 15px;
            background-color: white;
        }
        .item {
            border-bottom: 1px solid #ddd;
            padding: 10px;
            margin: 10px 0;
            background-color: #f9f9f9;
        }
        .error {
            color: red;
            padding: 10px;
            background-color: #ffe6e6;
            border-radius: 5px;
            margin: 10px 0;
        }
        .success {
            color: green;
            padding: 10px;
            background-color: #e6ffe6;
            border-radius: 5px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <h1>Guardando Datos Compartidos</h1>
    
    <div id="mensaje"></div>
    
    <label>Tu nombre:</label>
    <input type="text" id="nombre" placeholder="Escribe tu nombre aquí">
    
    <label>Tu mensaje:</label>
    <input type="text" id="mensaje-input" placeholder="Escribe tu mensaje aquí">
    
    <button onclick="guardarDato()">GUARDAR</button>

    <div class="datos">
        <h2>Todos los datos guardados:</h2>
        <div id="lista">Cargando...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBfLKi3a6kZqkMKPQ8wRADQlUu3_NacXAA",
            databaseURL: "https://modo-prueba-bb8c2-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.guardarDato = function() {
            const nombre = document.getElementById('nombre').value;
            const mensajeInput = document.getElementById('mensaje-input').value;
            const mensajeDiv = document.getElementById('mensaje');

            if (nombre.trim() === '' || mensajeInput.trim() === '') {
                mensajeDiv.className = 'error';
                mensajeDiv.textContent = '❌ Por favor llena todos los campos';
                return;
            }

            push(ref(db, 'datos'), {
                nombre: nombre,
                mensaje: mensajeInput,
                fecha: new Date().toLocaleString('es-AR')
            }).then(() => {
                document.getElementById('nombre').value = '';
                document.getElementById('mensaje-input').value = '';
                mensajeDiv.className = 'success';
                mensajeDiv.textContent = '✅ ¡Guardado correctamente!';
                setTimeout(() => {
                    mensajeDiv.textContent = '';
                }, 2000);
            }).catch((error) => {
                mensajeDiv.className = 'error';
                mensajeDiv.textContent = '❌ Error: ' + error.message;
            });
        }

        onValue(ref(db, 'datos'), (snapshot) => {
            const lista = document.getElementById('lista');
            lista.innerHTML = '';
            
            if (!snapshot.exists()) {
                lista.innerHTML = '<p>Sin datos aún...</p>';
                return;
            }
            
            snapshot.forEach((child) => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerHTML = `
                    <strong>${child.val().nombre}</strong><br>
                    ${child.val().mensaje}<br>
                    <small style="color: #666;">${child.val().fecha}</small>
                `;
                lista.appendChild(div);
            });
        });
    </script>
</body>
</html>
