<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <!-- Fondo gris claro -->
  <rect width="500" height="500" fill="#E8E8E8"/>

  <!-- R: arco grueso tipo C (stroke) -->
  <!-- El arco va de abajo hacia arriba por la izquierda -->
  <path d="M 248,340 A 130,140 0 1,1 248,60"
        fill="none" stroke="#111" stroke-width="80" stroke-linecap="square"/>

  <!-- Pata diagonal del R: desde centro-derecha hacia abajo -->
  <line x1="248" y1="185" x2="320" y2="345"
        stroke="#111" stroke-width="76" stroke-linecap="square"/>

  <!-- Separador blanco para limpiar el cruce entre arco y pata -->
  <rect x="155" y="185" width="105" height="75" fill="#E8E8E8"/>

  <!-- K: triángulo superior -->
  <polygon points="272,52 462,52 272,203" fill="#111"/>
  <!-- K: triángulo inferior -->
  <polygon points="272,203 462,348 272,348" fill="#111"/>

  <!-- Línea separadora blanca vertical entre R y K -->
  <rect x="252" y="52" width="18" height="296" fill="#E8E8E8"/>

  <!-- Texto ARQUITECTURA -->
  <text x="250" y="442"
        font-family="Arial, Helvetica, sans-serif"
        font-size="44"
        font-weight="300"
        letter-spacing="12"
        text-anchor="middle"
        fill="#111">ARQUITECTURA</text>
</svg>