<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <rect width="500" height="500" fill="#000"/>

  <!-- Logo centrado, area ~340x270 -->
  <g transform="translate(78, 90)">

    <!-- ═══ R ═══ (0..160 ancho, 0..215 alto) -->
    <!-- C hueca: rectángulo exterior menos interior (even-odd) -->
    <path fill="#fff" fill-rule="evenodd" d="
      M 30,0
      H 118 Q 158,0 158,40
      V 92  Q 158,132 118,132
      H 30  Z
      M 60,30
      H 110 Q 128,30 128,50
      V 82  Q 128,102 110,102
      H 60  Z
    "/>
    <!-- Barra vertical izquierda -->
    <rect x="0" y="0" width="30" height="215" fill="#fff"/>
    <!-- Pierna diagonal R: desde esquina interna-derecha hasta base -->
    <polygon fill="#fff" points="110,102  158,132  158,215  110,160"/>

    <!-- ═══ K ═══ offset 172 -->
    <g transform="translate(172,0)">
      <!-- Triángulo superior -->
      <polygon fill="#fff" points="0,0  168,0  0,107"/>
      <!-- Triángulo inferior -->
      <polygon fill="#fff" points="0,107  168,215  0,215"/>
    </g>

  </g>

  <!-- ARQUITECTURA -->
  <text x="250" y="452"
        font-family="Arial, Helvetica, sans-serif"
        font-size="28"
        font-weight="300"
        letter-spacing="10"
        text-anchor="middle"
        fill="#fff">ARQUITECTURA</text>
</svg>
