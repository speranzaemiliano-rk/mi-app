<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <!-- Fondo oscuro -->
  <rect width="500" height="500" rx="80" fill="#0f1117"/>

  <!-- Letras RK en dorado, grandes y simples -->
  <text x="250" y="330"
        font-family="Georgia, serif"
        font-size="280"
        font-weight="700"
        letter-spacing="-10"
        text-anchor="middle"
        fill="#C9A84C">RK</text>

  <!-- Línea dorada abajo -->
  <rect x="80" y="390" width="340" height="6" rx="3" fill="#C9A84C"/>

  <!-- Texto chico -->
  <text x="250" y="450"
        font-family="Arial, Helvetica, sans-serif"
        font-size="42"
        font-weight="300"
        letter-spacing="14"
        text-anchor="middle"
        fill="#C9A84C">GESTIÓN</text>
</svg>